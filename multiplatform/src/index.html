<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background-color: transparent !important;
      background: transparent !important;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    #cat-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #cat-sprite {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: pointer;
      pointer-events: auto;
    }
    /* Meow bubble */
    #meow-bubble {
      display: none;
      background: #f2e6d0;
      border: 3px solid #4d3319;
      border-radius: 4px;
      padding: 4px 10px;
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      color: #4d3319;
      white-space: nowrap;
      pointer-events: none;
      margin-bottom: 6px;
      position: relative;
    }
    #meow-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid #4d3319;
    }
    /* Chat bubble */
    #chat-bubble {
      display: none;
      width: 280px;
      background: #f2e6d0;
      border: 3px solid #4d3319;
      border-radius: 6px;
      padding: 12px;
      font-family: monospace;
      color: #4d3319;
      margin-bottom: 6px;
      position: relative;
      pointer-events: auto;
    }
    #chat-bubble::after {
      content: '';
      position: absolute;
      bottom: -10px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 10px solid #4d3319;
    }
    #chat-response {
      font-size: 11px;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 8px;
      max-height: 120px;
      overflow-y: auto;
      word-wrap: break-word;
    }
    #chat-input {
      width: 100%;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 11px;
      border: 2px solid #4d3319;
      border-radius: 3px;
      background: #fffaef;
      color: #4d3319;
      outline: none;
      pointer-events: auto;
    }
    #chat-input::placeholder {
      color: #a08060;
    }
  </style>
</head>
<body>
  <div id="cat-container">
    <div id="meow-bubble"></div>
    <div id="chat-bubble">
      <div id="chat-response"></div>
      <input id="chat-input" type="text" autocomplete="off" />
    </div>
    <img id="cat-sprite" src="" alt="cat" draggable="false" />
  </div>
  <script src="cat.js"></script>
</body>
</html>
